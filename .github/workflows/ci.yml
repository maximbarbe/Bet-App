name: Continuous Integration

# Validate every branch update and every pull request before changes are merged.
on:
  push:
  pull_request:
  workflow_dispatch:

# The workflow only needs permission to read the repository contents.
permissions:
  contents: read

# Cancel an older run when a newer commit arrives on the same branch or PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Syntax and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Download the commit being tested into the GitHub-hosted runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Node 24 includes the SQLite API used by the application.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install the exact dependency tree from package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Parse every JavaScript file without executing application code.
      - name: Check JavaScript syntax
        run: npm run check

      # Catch trailing whitespace and malformed conflict-style patches.
      - name: Check repository whitespace
        run: git diff --check

      # Start an isolated server and test HTTP, SQLite, CRUD, and settlement math.
      - name: Run integration tests
        run: npm test

  container:
    name: Build and smoke-test container
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Building in CI catches invalid Dockerfiles and missing runtime files.
      - name: Build Docker image
        run: docker build --tag edge-bet-tracker:ci .

      - name: Start container
        run: docker run --detach --name edge-ci --publish 4173:4173 edge-bet-tracker:ci

      # Wait for the API to become healthy and prove the exposed port works.
      - name: Smoke-test container
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/api/bets > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs edge-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm --force edge-ci || true
